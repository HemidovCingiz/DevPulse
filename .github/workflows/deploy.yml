name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test-and-build:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: devpulse_user
                    POSTGRES_PASSWORD: devpulse_password
                    POSTGRES_DB: devpulse_dev
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install backend dependencies
              run: |
                  cd backend
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "20"

            - name: Install frontend dependencies and build
              run: |
                  cd frontend
                  npm install
                  npm run build

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Build Docker Images
              run: |
                  docker build -t devpulse-backend:latest ./backend
                  docker build -t devpulse-frontend:latest ./frontend
