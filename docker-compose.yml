version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: devpulse_db
    environment:
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_password
      POSTGRES_DB: devpulse_dev
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: devpulse_backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://devpulse_user:devpulse_password@db:5432/devpulse_dev
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: devpulse_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: